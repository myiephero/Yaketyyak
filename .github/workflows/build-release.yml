name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        edition: [lite, full]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install textual rich openai pexpect pyinstaller pillow

      - name: Build ${{ matrix.edition }} edition
        run: python build.py --${{ matrix.edition }}

      - name: Import signing certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "SIGNING_READY=true" >> $GITHUB_ENV

      - name: Sign and notarize app
        env:
          SIGNING_READY: ${{ env.SIGNING_READY }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ "${{ matrix.edition }}" = "lite" ]; then
            APP_PATH="dist/Yakety Yak.app"
          else
            APP_PATH="dist/full-edition/Yakety Yak.app"
          fi

          xattr -cr "$APP_PATH"

          if [ "$SIGNING_READY" = "true" ]; then
            echo "Signing with Developer ID certificate..."
            codesign --force --deep --options runtime \
              --sign "$APPLE_SIGNING_IDENTITY" \
              --timestamp \
              "$APP_PATH"

            echo "Submitting for notarization..."
            ZIP_FOR_NOTARY="$RUNNER_TEMP/notarize.zip"
            ditto -c -k --keepParent "$APP_PATH" "$ZIP_FOR_NOTARY"

            xcrun notarytool submit "$ZIP_FOR_NOTARY" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait --timeout 600

            echo "Stapling notarization ticket..."
            xcrun stapler staple "$APP_PATH"

            echo "Verifying signature..."
            codesign --verify --deep --strict "$APP_PATH"
            spctl --assess --type execute "$APP_PATH"
            echo "App is signed and notarized!"
          else
            echo "No signing certificate found — using ad-hoc signature"
            codesign --force --deep --sign - "$APP_PATH"
          fi

      - name: Clean up keychain
        if: always() && env.KEYCHAIN_PATH != ''
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

      - name: Package macOS Lite
        if: matrix.edition == 'lite'
        run: |
          cd dist
          zip -r "../YaketyYak-Lite-macOS.zip" "Yakety Yak.app"

      - name: Package macOS Full
        if: matrix.edition == 'full'
        run: |
          cd dist/full-edition
          zip -r "../../YaketyYak-Full-macOS.zip" "Yakety Yak.app" setup-ai-mac.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.edition }}
          path: YaketyYak-*-macOS.zip

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        edition: [lite, full]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install textual rich openai pexpect pyinstaller pillow

      - name: Build ${{ matrix.edition }} edition
        run: python build.py --${{ matrix.edition }}

      - name: Package Linux Lite
        if: matrix.edition == 'lite'
        run: |
          cd dist
          tar czf "../YaketyYak-Lite-Linux.tar.gz" linux-package/

      - name: Package Linux Full
        if: matrix.edition == 'full'
        run: |
          cd dist
          tar czf "../YaketyYak-Full-Linux.tar.gz" full-edition/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.edition }}
          path: YaketyYak-*-Linux.tar.gz

  release:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List files
        run: ls -la YaketyYak-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            YaketyYak-Lite-macOS.zip
            YaketyYak-Full-macOS.zip
            YaketyYak-Lite-Linux.tar.gz
            YaketyYak-Full-Linux.tar.gz
